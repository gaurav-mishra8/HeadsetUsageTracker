name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  pr-checks:
    runs-on: ubuntu-latest
    name: Pre-submit Checks
    permissions:
      contents: read
      pull-requests: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Build debug APK
      id: build
      run: ./gradlew assembleDebug --no-daemon
      
    - name: Run unit tests
      id: test
      run: ./gradlew testDebugUnitTest --no-daemon

    - name: Run ktlint
      id: ktlint
      run: ./gradlew ktlintCheck --no-daemon
      continue-on-error: true

    - name: Run detekt
      id: detekt
      run: ./gradlew detekt --no-daemon
      continue-on-error: true

    - name: Run Android lint
      id: lint
      run: ./gradlew lintDebug --no-daemon
      continue-on-error: true
        
    - name: Comment PR with results
      uses: actions/github-script@v7
      if: always()
      with:
        script: |
          const buildStep = '${{ steps.build.outcome }}';
          const testStep = '${{ steps.test.outcome }}';
          const ktlintStep = '${{ steps.ktlint.outcome }}';
          const detektStep = '${{ steps.detekt.outcome }}';
          const lintStep = '${{ steps.lint.outcome }}';
          
          let comment = '## 🔍 Pre-submit Check Results\n\n';
          comment += `| Check | Status |\n|-------|--------|\n`;
          comment += `| Build | ${buildStep === 'success' ? '✅ Passed' : '❌ Failed'} |\n`;
          comment += `| Unit Tests | ${testStep === 'success' ? '✅ Passed' : '❌ Failed'} |\n`;
          comment += `| ktlint | ${ktlintStep === 'success' ? '✅ Passed' : '⚠️ Issues found'} |\n`;
          comment += `| detekt | ${detektStep === 'success' ? '✅ Passed' : '⚠️ Issues found'} |\n`;
          comment += `| Android Lint | ${lintStep === 'success' ? '✅ Passed' : '⚠️ Issues found'} |\n`;
          comment += '\n---\n*Runs automatically on every PR.*';
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

